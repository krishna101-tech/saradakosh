<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .level1-title { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); margin-top: 40px; padding-bottom: 5px; }
        .level2-title { color: var(--secondary-color); font-size: 1.2rem; margin-top: 20px; font-weight: 600; }
        .ref-item { display: grid; grid-template-columns: 200px 1fr 1fr; gap: 15px; padding: 10px; border-bottom: 1px solid #eed; font-size: 0.95rem; }
        .ref-header { display: grid; grid-template-columns: 200px 1fr 1fr; gap: 15px; padding: 10px; font-weight: bold; background: #fff8f0; border-bottom: 1px solid #ccc; margin-top: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--text-color); font-weight: bold; }
        .back-link:hover { color: var(--primary-color); text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">&larr; Back to Dashboard</a>
    <h1>Interactive References Archive</h1>
    
    <div id="report-container">
        <p style="color:#888;">Loading Interactive Report...</p>
    </div>
</div>

<script>
async function loadReport() {
    const res = await fetch('data/ref_report.json');
    const data = await res.json();
    
    let html = '';
    
    // Sort Level 1 keys alphabetically
    Object.keys(data).sort().forEach(l1 => {
        html += `<h2 class="level1-title">${l1}</h2>`;
        
        // Sort Level 2 keys alphabetically
        Object.keys(data[l1]).sort().forEach(l2 => {
            html += `<div class="level2-title">${l2}</div>`;
            
            html += `<div class="ref-header">
                        <div>Name</div>
                        <div>Remark 1</div>
                        <div>Remark 2</div>
                     </div>`;
                     
            // Sort items by name
            const items = data[l1][l2].sort((a,b) => String(a.name || "").localeCompare(String(b.name || "")));
            
            items.forEach(item => {
                html += `<div class="ref-item">
                            <div class="clickable-name" data-id="${item.id}" style="font-weight:600; cursor:pointer; color:var(--primary-color);" title="Click to view events">${item.name || '-'}</div>
                            <div>${item.remark || '-'}</div>
                            <div>${item.remark2 || '-'}</div>
                         </div>`;
            });
        });
    });
    
    document.getElementById('report-container').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', loadReport);

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('clickable-name')) {
        let id = e.target.getAttribute('data-id');
        if (id && id !== 'undefined' && id !== 'null') {
            window.open('viewer.html?paramId=' + id, '_blank');
        } else {
            let text = e.target.innerText.trim();
            if (text !== '-') {
                window.open('viewer.html?paramName=' + encodeURIComponent(text), '_blank');
            }
        }
    }
});
</script>

<style>
.back-to-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background-color: #d35400;
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(211, 84, 0, 0.4);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    z-index: 1000;
    cursor: pointer;
    border: none;
    outline: none;
    font-family: sans-serif;
}
.back-to-top.visible {
    opacity: 1;
    visibility: visible;
}
.back-to-top:hover {
    background-color: #b94a00;
    transform: translateY(-5px);
    box-shadow: 0 6px 20px rgba(211, 84, 0, 0.5);
}
</style>
<button class="back-to-top" id="backToTopBtn" title="Go to top">&#8593;</button>
<script>
document.addEventListener("DOMContentLoaded", function() {
    var btn = document.getElementById("backToTopBtn");
    if(!btn) return;
    
    window.addEventListener("scroll", function() {
        if (window.scrollY > 300) {
            btn.classList.add("visible");
        } else {
            btn.classList.remove("visible");
        }
    });
    
    btn.addEventListener("click", function() {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });
});
</script>
</body>

</html>
