<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Viewer</title>
    <link href="css/style_main.css?v=14" rel="stylesheet">
    <style>
        body { padding: 40px; }
        .title { color: var(--primary-color); font-family: var(--font-serif); font-size: 2rem; margin-bottom: 30px; text-align: center; }
        .back-link { display: inline-block; margin-bottom: 20px; font-weight: bold; color: var(--text-color); text-decoration: none; border-bottom: 1px solid var(--text-color); }
        .back-link:hover { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        
        .acc-row { display: flex; gap: 15px; align-items: baseline; width: 100%; text-align: left; font-family: var(--font-sans); }
        .acc-seq { font-weight: bold; width: 30px; flex-shrink: 0; color: #555; }
        .acc-yr { color: var(--secondary-color); font-weight: bold; width: 100px; flex-shrink: 0; white-space: nowrap; text-align: right; }
        .acc-type { color: var(--primary-color); font-weight: bold; width: 60px; flex-shrink: 0; }
        .acc-du { flex: 1; font-weight: 500; }
        
        .panel { padding: 10px 18px 20px 115px; } /* Indent to align with text */
        .child-text { margin-bottom: 10px; line-height: 1.6; color: #444; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .child-text:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        
        /* Mobile Card Design */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .acc-row { flex-wrap: wrap; gap: 8px; }
            .acc-seq { width: auto; min-width: 15px; }
            .acc-yr { width: auto; text-align: left; }
            .acc-type { width: auto; }
            .acc-du { flex-basis: 100%; margin-top: 4px; }
            .panel { padding: 10px 15px 15px 15px; }
            .accordion-static { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <a href="javascript:window.close()" class="back-link">&larr; Close Viewer</a>
        <h2 id="record-title" class="title">Loading...</h2>
        <h3 id="record-count" style="text-align: center; color: var(--secondary-color); font-weight: 300; margin-top: -20px; margin-bottom: 30px;"></h3>
        <div id="content-container"></div>
    </div>

    <script src="js/viewer.js?v=2"></script>

<style>
.back-to-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background-color: #d35400;
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(211, 84, 0, 0.4);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    z-index: 1000;
    cursor: pointer;
    border: none;
    outline: none;
    font-family: sans-serif;
}
.back-to-top.visible {
    opacity: 1;
    visibility: visible;
}
.back-to-top:hover {
    background-color: #b94a00;
    transform: translateY(-5px);
    box-shadow: 0 6px 20px rgba(211, 84, 0, 0.5);
}
</style>
<button class="back-to-top" id="backToTopBtn" title="Go to top">&#8593;</button>
<script>
document.addEventListener("DOMContentLoaded", function() {
    var btn = document.getElementById("backToTopBtn");
    if(!btn) return;
    
    window.addEventListener("scroll", function() {
        if (window.scrollY > 300) {
            btn.classList.add("visible");
        } else {
            btn.classList.remove("visible");
        }
    });
    
    btn.addEventListener("click", function() {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });
});
</script>
</body>

</html>
