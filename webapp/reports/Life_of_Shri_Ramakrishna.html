<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="../css/style.css?v=3" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
body { 
    font-family: 'Inter', "Segoe UI", sans-serif; 
    font-size: 15px; 
    background-color: #f4f5f7; 
    color: #333; 
    margin: 40px auto; 
    max-width: 1000px; 
    padding: 40px 60px; 
    background: white; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
    border-radius: 12px;
}
h1 { color: #2c3e50; font-weight: 700; font-size: 2.2rem; margin-top: 0; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }

/* Modern Level 1 & 2 colors WITH collapse pointer */
.level1 { color: #d35400; font-weight: 700; font-size: 1.25rem; margin-top: 35px; margin-bottom: 12px; border-bottom: 1px solid #f2e3d5; padding-bottom: 5px; cursor: pointer; user-select: none; }
.level2 { color: #2980b9; font-weight: 600; font-size: 1.05rem; margin-left: 20px; margin-top: 15px; margin-bottom: 8px; border-left: 3px solid #3498db; padding-left: 12px; cursor: pointer; user-select: none; }

.level1::before, .level2::before { content: '▼ '; font-size: 0.75em; display: inline-block; transition: transform 0.2s; color: #aaa; margin-right: 6px; }
.level1.collapsed::before, .level2.collapsed::before { transform: rotate(-90deg); }

.level3-container { margin-left: 50px; display: table; width: 100%; max-width: 800px; border-bottom: 1px solid #f8f9fa; transition: background 0.2s; }
.level3-container:hover { background-color: #fafbfc; }
.level3-row { display: table-row; }
.level3-text { display: table-cell; color: #444; padding: 10px 5px; font-size: 0.95rem; }
.level3-seq { display: none; color: #95a5a6; font-size: 0.85rem; text-align: right; padding: 10px 10px; font-variant-numeric: tabular-nums; }
.level3-remark { display: table-cell; color: #7f8c8d; font-size: 0.85rem; text-align: right; padding: 10px 10px; }

/* Styles for List Reports */
.header { background-color: #d35400; padding: 12px 15px; text-align: center; font-weight: 700; color: white; margin-bottom: 15px; border-radius: 6px; width: 400px; font-size: 1.1rem; }
.item { margin-bottom: 8px; padding: 10px 20px; width: 370px; background: #fff; border: 1px solid #eee; border-radius: 6px; transition: all 0.2s; color: #2c3e50; font-weight: 500; }
.item:hover { background: #fffaf5; border-color: #f2e3d5; transform: translateX(5px); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }

/* Styles for Table Reports */
table { border-collapse: separate; border-spacing: 0; width: 100%; margin-top: 20px; font-size: 0.95rem; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
th { background-color: #f8f9fa; color: #2c3e50; font-weight: 600; text-align: left; padding: 15px; border-bottom: 1px solid #ddd; }
td { padding: 12px 15px; border-bottom: 1px solid #eee; color: #444; }
tr:last-child td { border-bottom: none; }
tr:hover td { background-color: #fafbfc; }

/* Back link */
.back-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #7f8c8d; font-weight: 600; transition: 0.2s; }
.back-link:hover { color: #d35400; }
</style>
</head><body><div class="container">
<h1>Life of Shri Ramakrishna</h1>

<style>
.level-toggles { margin-top: 15px; margin-bottom: 25px; display: flex; align-items: center; font-family: 'Inter', "Segoe UI", sans-serif; }
.toggle-btn { border: 2px solid #d35400; padding: 6px 18px; margin-right: 12px; cursor: pointer; border-radius: 6px; background: white; color: #d35400; font-weight: bold; font-size: 14px; transition: 0.2s; text-align: center; }
.toggle-btn:hover { background: #fff1e6; }
.toggle-btn.active { background: #d35400; color: white; }
</style>
<div class="level-toggles">
    <span style="font-weight:bold; margin-right: 15px; color: #333; font-size: 15px;">Levels:</span>
    <div class="toggle-btn" onclick="setLevel(1)">1</div>
    <div class="toggle-btn" onclick="setLevel(2)">2</div>
    <div class="toggle-btn active" onclick="setLevel(3)">3</div>
</div>
<script>
function setLevel(level) {
    var btns = document.querySelectorAll('.toggle-btn');
    if(btns.length >= 3) {
        btns[0].classList.toggle('active', level === 1);
        btns[1].classList.toggle('active', level === 2);
        btns[2].classList.toggle('active', level === 3);
    }
    
    document.querySelectorAll('.level2').forEach(function(el) {
        el.style.display = level >= 2 ? 'block' : 'none';
    });
    
    document.querySelectorAll('.level3-container').forEach(function(el) {
        el.style.display = level >= 3 ? 'table' : 'none';
    });
}
// Default state is already 3.
</script>

<div class="level1">1 Balya Parva</div>
<div class="level2">1 Birth of Avatar</div>
<div class="level3-container"><div class="level3-row">
<div class="level3-text">1 History: Manikram and Dere Village</div>
<div class="level3-seq">10</div>
</div></div>
<div class="level3-container"><div class="level3-row">
<div class="level3-text">2 Kamarpukur : Birthplace of the Avatar</div>
<div class="level3-seq">50</div>
</div></div>
<div class="level3-container"><div class="level3-row">
<div class="level3-text">3 The Pious Family of Kamarpukur</div>
<div class="level3-seq">100</div>
</div></div>
<div class="level2">2 Boyhood</div>
<div class="level3-container"><div class="level3-row">
<div class="level3-text">1 Boyhood</div>
<div class="level3-seq">10</div>
</div></div>
<div class="level2">3 Beginning of the Youth</div>
<div class="level3-container"><div class="level3-row">
<div class="level3-text">1 Beginning of the Youth</div>
<div class="level3-seq">10</div>
</div></div>
</div>
<script>
document.addEventListener('click', function(e) {
    // Handle row clicks in tables (ID is usually in the first column)
    if (e.target.tagName === 'TD') {
        const tr = e.target.parentElement;
        const firstTd = tr.querySelector('td');
        if (firstTd) {
            const text = firstTd.innerText.trim();
            if (/^\d+$/.test(text)) {
                window.open('../viewer.html?paramId=' + encodeURIComponent(text), '_blank');
                return;
            }
        }
    }
    
    // Handle div items (like Person_Report, Type_Report)
    if (e.target.classList.contains('item')) {
        const text = e.target.innerText.trim();
        window.open('../viewer.html?paramName=' + encodeURIComponent(text), '_blank');
        return;
    }

    // Handle Vivekananda report specifically
    if (e.target.classList.contains('level3-text')) {
        let text = e.target.innerText.trim();
        // Remove leading numbers, e.g., "1 Ancestry" -> "Ancestry"
        text = text.replace(/^\d+\s*/, '');
        window.open('../viewer.html?paramName=' + encodeURIComponent(text), '_blank');
        return;
    }
});
// Change cursor to pointer for clickable elements
document.querySelectorAll('.item, td, .level3-text').forEach(el => {
    el.style.cursor = 'pointer';
    el.title = "Click to view events";
});
</script>

<script>
// Individual level toggling logic
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('level1')) {
        let el = e.target.nextElementSibling;
        let isCollapsed = e.target.classList.toggle('collapsed');
        while (el && !el.classList.contains('level1')) {
            if (el.classList.contains('level2')) {
                el.style.display = isCollapsed ? 'none' : 'block';
            } else if (el.classList.contains('level3-container')) {
                let prev = el.previousElementSibling;
                let parentL2Collapsed = false;
                while (prev && !prev.classList.contains('level1')) {
                    if (prev.classList.contains('level2')) {
                        parentL2Collapsed = prev.classList.contains('collapsed');
                        break;
                    }
                    prev = prev.previousElementSibling;
                }
                
                if (isCollapsed) {
                    el.style.display = 'none';
                } else {
                    el.style.display = parentL2Collapsed ? 'none' : 'table';
                }
            }
            el = el.nextElementSibling;
        }
    }
    
    if (e.target.classList.contains('level2')) {
        let el = e.target.nextElementSibling;
        let isCollapsed = e.target.classList.toggle('collapsed');
        while (el && !el.classList.contains('level2') && !el.classList.contains('level1')) {
            if (el.classList.contains('level3-container')) {
                el.style.display = isCollapsed ? 'none' : 'table';
            }
            el = el.nextElementSibling;
        }
    }
});

// Update the master toggle to also handle the arrow states
if (typeof setLevel === 'function') {
    const originalSetLevel = setLevel;
    window.setLevel = function(level) {
        originalSetLevel(level);
        
        // Fix up the collapsed classes based on the master level
        document.querySelectorAll('.level1').forEach(function(el) {
            if (level >= 2) el.classList.remove('collapsed');
            else el.classList.add('collapsed');
        });
        
        document.querySelectorAll('.level2').forEach(function(el) {
            if (level >= 3) el.classList.remove('collapsed');
            else el.classList.add('collapsed');
        });
    };
    // Re-trigger the initial state
    window.setLevel(3);
}
</script>

<style>
.back-to-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background-color: #d35400;
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(211, 84, 0, 0.4);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    z-index: 1000;
    cursor: pointer;
    border: none;
    outline: none;
    font-family: sans-serif;
}
.back-to-top.visible {
    opacity: 1;
    visibility: visible;
}
.back-to-top:hover {
    background-color: #b94a00;
    transform: translateY(-5px);
    box-shadow: 0 6px 20px rgba(211, 84, 0, 0.5);
}
</style>
<button class="back-to-top" id="backToTopBtn" title="Go to top">&#8593;</button>
<script>
document.addEventListener("DOMContentLoaded", function() {
    var btn = document.getElementById("backToTopBtn");
    if(!btn) return;
    
    window.addEventListener("scroll", function() {
        if (window.scrollY > 300) {
            btn.classList.add("visible");
        } else {
            btn.classList.remove("visible");
        }
    });
    
    btn.addEventListener("click", function() {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });
});
</script>
</body>


</html>
